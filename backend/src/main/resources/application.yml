spring:
  application:
    name: archive-nexus-backend
  datasource:
    url: ${ARCHIVE_NEXUS_DB_URL:jdbc:postgresql://localhost:55432/archive_nexus}
    username: ${ARCHIVE_NEXUS_DB_USERNAME:archive_nexus}
    password: ${ARCHIVE_NEXUS_DB_PASSWORD:archive_nexus_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 2000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  sql:
    init:
      mode: never

archive-nexus:
  archiveos:
    base-url: ${ARCHIVEOS_BASE_URL:http://host.docker.internal:4000}
    timeout-ms: ${ARCHIVEOS_TIMEOUT_MS:2000}
  notifications:
    discord-webhook-url: ${ARCHIVE_NEXUS_DISCORD_WEBHOOK_URL:}
  simulator:
    seed: 20260626
    tick-delay-ms: 5000
    persistence-enabled: true
    state-file: data/archive-nexus-state.json

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
