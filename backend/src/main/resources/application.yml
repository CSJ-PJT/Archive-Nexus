spring:
  application:
    name: archive-nexus-backend
  datasource:
    url: ${ARCHIVE_NEXUS_DB_URL:jdbc:postgresql://localhost:55432/archive_nexus}
    username: ${ARCHIVE_NEXUS_DB_USERNAME:archive_nexus}
    password: ${ARCHIVE_NEXUS_DB_PASSWORD:archive_nexus_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 2000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  sql:
    init:
      mode: never
  task:
    scheduling:
      pool:
        size: ${SPRING_TASK_SCHEDULING_POOL_SIZE:4}

archive-nexus:
  platform:
    environment: ${ARCHIVE_NEXUS_ENVIRONMENT:local}
    repository: ${ARCHIVE_NEXUS_REPOSITORY:https://github.com/CSJ-PJT/Archive-Nexus}
    backend-atlas-url: ${BACKEND_ATLAS_URL:https://github.com/CSJ-PJT/Backend-Atlas}
  ledger:
    enabled: ${ARCHIVE_LEDGER_ENABLED:true}
    base-url: ${ARCHIVE_LEDGER_BASE_URL:http://localhost:18080}
    timeout-ms: ${ARCHIVE_LEDGER_TIMEOUT_MS:30000}
    publish-interval-ms: ${ARCHIVE_LEDGER_PUBLISH_INTERVAL_MS:15000}
    publish-batch-size: ${ARCHIVE_LEDGER_PUBLISH_BATCH_SIZE:100}
  archiveos:
    base-url: ${ARCHIVEOS_BASE_URL:http://host.docker.internal:4000}
    integration-token: ${ARCHIVEOS_INTEGRATION_TOKEN:}
    timeout-ms: ${ARCHIVEOS_TIMEOUT_MS:2000}
    workflow:
      retry-attempts: ${ARCHIVEOS_WORKFLOW_RETRY_ATTEMPTS:3}
      sync-delay-ms: ${ARCHIVEOS_WORKFLOW_SYNC_DELAY_MS:5000}
  notifications:
    discord-webhook-url: ${ARCHIVE_NEXUS_DISCORD_WEBHOOK_URL:}
  simulator:
    seed: 20260626
    tick-delay-ms: 5000
    persistence-enabled: true
    state-file: data/archive-nexus-state.json

archive:
  integrations:
    logitics:
      enabled: ${ARCHIVE_INTEGRATIONS_LOGITICS_ENABLED:true}
      base-url: ${ARCHIVE_INTEGRATIONS_LOGITICS_BASE_URL:http://localhost:8092}
      bulk-endpoint: ${ARCHIVE_INTEGRATIONS_LOGITICS_BULK_ENDPOINT:/api/events/nexus/bulk}
      timeout-ms: ${ARCHIVE_INTEGRATIONS_LOGITICS_TIMEOUT_MS:30000}
    ledger:
      enabled: ${ARCHIVE_INTEGRATIONS_LEDGER_ENABLED:${ARCHIVE_LEDGER_ENABLED:true}}
      base-url: ${ARCHIVE_INTEGRATIONS_LEDGER_BASE_URL:${ARCHIVE_LEDGER_BASE_URL:http://localhost:18080}}
      bulk-endpoint: ${ARCHIVE_INTEGRATIONS_LEDGER_BULK_ENDPOINT:/api/events/nexus/bulk}
      timeout-ms: ${ARCHIVE_INTEGRATIONS_LEDGER_TIMEOUT_MS:${ARCHIVE_LEDGER_TIMEOUT_MS:30000}}
    routing:
      mode: ${ARCHIVE_INTEGRATIONS_ROUTING_MODE:AUTO}
      allow-ledger-direct-fallback-for-logistics: ${ARCHIVE_INTEGRATIONS_ROUTING_ALLOW_LEDGER_DIRECT_FALLBACK_FOR_LOGISTICS:false}
      chunk-size: ${ARCHIVE_INTEGRATIONS_ROUTING_CHUNK_SIZE:${ARCHIVE_LEDGER_PUBLISH_BATCH_SIZE:50}}
      max-retry-count: ${ARCHIVE_INTEGRATIONS_ROUTING_MAX_RETRY_COUNT:5}
      publish-interval-ms: ${ARCHIVE_INTEGRATIONS_ROUTING_PUBLISH_INTERVAL_MS:${ARCHIVE_LEDGER_PUBLISH_INTERVAL_MS:15000}}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
