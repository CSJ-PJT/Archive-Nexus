spring:
  application:
    name: archive-nexus-backend
  datasource:
    url: ${ARCHIVE_NEXUS_DB_URL:jdbc:postgresql://localhost:55432/archive_nexus}
    username: ${ARCHIVE_NEXUS_DB_USERNAME:archive_nexus}
    password: ${ARCHIVE_NEXUS_DB_PASSWORD:archive_nexus_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 2000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  sql:
    init:
      mode: never

archive-nexus:
  platform:
    environment: ${ARCHIVE_NEXUS_ENVIRONMENT:local}
    repository: ${ARCHIVE_NEXUS_REPOSITORY:https://github.com/CSJ-PJT/Archive-Nexus}
    backend-atlas-url: ${BACKEND_ATLAS_URL:https://github.com/CSJ-PJT/Backend-Atlas}
  ledger:
    enabled: ${ARCHIVE_LEDGER_ENABLED:false}
    base-url: ${ARCHIVE_LEDGER_BASE_URL:http://host.docker.internal:18080}
    timeout-ms: ${ARCHIVE_LEDGER_TIMEOUT_MS:2000}
    publish-interval-ms: ${ARCHIVE_LEDGER_PUBLISH_INTERVAL_MS:15000}
    publish-batch-size: ${ARCHIVE_LEDGER_PUBLISH_BATCH_SIZE:100}
  archiveos:
    base-url: ${ARCHIVEOS_BASE_URL:http://host.docker.internal:4000}
    integration-token: ${ARCHIVEOS_INTEGRATION_TOKEN:}
    timeout-ms: ${ARCHIVEOS_TIMEOUT_MS:2000}
    workflow:
      retry-attempts: ${ARCHIVEOS_WORKFLOW_RETRY_ATTEMPTS:3}
      sync-delay-ms: ${ARCHIVEOS_WORKFLOW_SYNC_DELAY_MS:5000}
  notifications:
    discord-webhook-url: ${ARCHIVE_NEXUS_DISCORD_WEBHOOK_URL:}
  simulator:
    seed: 20260626
    tick-delay-ms: 5000
    persistence-enabled: true
    state-file: data/archive-nexus-state.json

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
