services:
  postgres:
    image: postgres:16
    container_name: archive-nexus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  archive-nexus-backend:
    build:
      context: ./backend
    container_name: archive-nexus-backend
    init: true
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: ${ARCHIVE_NEXUS_JAVA_TOOL_OPTIONS:--Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m -XX:+ExitOnOutOfMemoryError}
      ARCHIVEOS_BASE_URL: ${ARCHIVEOS_BASE_URL:-http://host.docker.internal:4000}
      ARCHIVEOS_TIMEOUT_MS: ${ARCHIVEOS_TIMEOUT_MS:-2000}
      ARCHIVE_NEXUS_DB_URL: ${ARCHIVE_NEXUS_DB_URL:-jdbc:postgresql://postgres:5432/archive_nexus}
      ARCHIVE_NEXUS_DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      ARCHIVE_NEXUS_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      ARCHIVE_NEXUS_DISCORD_WEBHOOK_URL: ${ARCHIVE_NEXUS_DISCORD_WEBHOOK_URL:-}
      SPRING_TASK_SCHEDULING_POOL_SIZE: ${SPRING_TASK_SCHEDULING_POOL_SIZE:-2}
      ARCHIVE_LEDGER_ENABLED: ${ARCHIVE_LEDGER_ENABLED:-true}
      ARCHIVE_LEDGER_BASE_URL: ${ARCHIVE_LEDGER_BASE_URL:-http://host.docker.internal:18080}
      ARCHIVE_LEDGER_TIMEOUT_MS: ${ARCHIVE_LEDGER_TIMEOUT_MS:-30000}
      ARCHIVE_LEDGER_PUBLISH_INTERVAL_MS: ${ARCHIVE_LEDGER_PUBLISH_INTERVAL_MS:-15000}
      ARCHIVE_INTEGRATIONS_LOGITICS_ENABLED: ${ARCHIVE_INTEGRATIONS_LOGITICS_ENABLED:-true}
      ARCHIVE_INTEGRATIONS_LOGITICS_BASE_URL: ${ARCHIVE_INTEGRATIONS_LOGITICS_BASE_URL:-http://host.docker.internal:8092}
      ARCHIVE_INTEGRATIONS_LOGITICS_TIMEOUT_MS: ${ARCHIVE_INTEGRATIONS_LOGITICS_TIMEOUT_MS:-30000}
      ARCHIVE_INTEGRATIONS_LEDGER_ENABLED: ${ARCHIVE_INTEGRATIONS_LEDGER_ENABLED:-true}
      ARCHIVE_INTEGRATIONS_LEDGER_BASE_URL: ${ARCHIVE_INTEGRATIONS_LEDGER_BASE_URL:-http://host.docker.internal:18080}
      ARCHIVE_INTEGRATIONS_LEDGER_TIMEOUT_MS: ${ARCHIVE_INTEGRATIONS_LEDGER_TIMEOUT_MS:-30000}
      ARCHIVE_INTEGRATIONS_ROUTING_ALLOW_LEDGER_DIRECT_FALLBACK_FOR_LOGISTICS: ${ARCHIVE_INTEGRATIONS_ROUTING_ALLOW_LEDGER_DIRECT_FALLBACK_FOR_LOGISTICS:-false}
      ARCHIVE_INTEGRATIONS_ROUTING_CHUNK_SIZE: ${ARCHIVE_INTEGRATIONS_ROUTING_CHUNK_SIZE:-20}
      ARCHIVE_INTEGRATIONS_ROUTING_MAX_RETRY_COUNT: ${ARCHIVE_INTEGRATIONS_ROUTING_MAX_RETRY_COUNT:-5}
      ARCHIVE_INTEGRATIONS_ROUTING_PUBLISH_INTERVAL_MS: ${ARCHIVE_INTEGRATIONS_ROUTING_PUBLISH_INTERVAL_MS:-15000}
      ARCHIVE_INTEGRATIONS_ROUTING_AUTO_PUBLISH_ENABLED: ${ARCHIVE_INTEGRATIONS_ROUTING_AUTO_PUBLISH_ENABLED:-false}
      ARCHIVE_RUNTIME_AUTORUN_ENABLED: ${ARCHIVE_RUNTIME_AUTORUN_ENABLED:-false}
      ARCHIVE_RUNTIME_TICK_INTERVAL: ${ARCHIVE_RUNTIME_TICK_INTERVAL:-30s}
      ARCHIVE_RUNTIME_MAX_EVENTS_PER_TICK: ${ARCHIVE_RUNTIME_MAX_EVENTS_PER_TICK:-10}
      ARCHIVE_RUNTIME_MAX_BACKLOG_PER_TICK: ${ARCHIVE_RUNTIME_MAX_BACKLOG_PER_TICK:-50}
      ARCHIVEOS_RUNTIME_INGEST_ENABLED: ${ARCHIVEOS_RUNTIME_INGEST_ENABLED:-false}
      ARCHIVEOS_RUNTIME_INGEST_TIMEOUT_MS: ${ARCHIVEOS_RUNTIME_INGEST_TIMEOUT_MS:-2000}
      ARCHIVEOS_RUNTIME_INGEST_BATCH_SIZE: ${ARCHIVEOS_RUNTIME_INGEST_BATCH_SIZE:-10}
      ARCHIVEOS_RUNTIME_INGEST_MAX_RETRY: ${ARCHIVEOS_RUNTIME_INGEST_MAX_RETRY:-5}
      ARCHIVEOS_RUNTIME_INGEST_RETRY_DELAY_MS: ${ARCHIVEOS_RUNTIME_INGEST_RETRY_DELAY_MS:-5000}
      ARCHIVEOS_RUNTIME_INGEST_STARTUP_DELAY_MS: ${ARCHIVEOS_RUNTIME_INGEST_STARTUP_DELAY_MS:-30000}
      ARCHIVEOS_RUNTIME_INGEST_FIXED_DELAY_MS: ${ARCHIVEOS_RUNTIME_INGEST_FIXED_DELAY_MS:-5000}
      SPRING_PROFILES_ACTIVE: rc
      ARCHIVE_SECURITY_ENABLED: "true"
      ARCHIVE_SECURITY_MAX_PAYLOAD_BYTES: ${ARCHIVE_SECURITY_MAX_PAYLOAD_BYTES:-1048576}
      ARCHIVE_SECURITY_MAX_BATCH_ITEMS: ${ARCHIVE_SECURITY_MAX_BATCH_ITEMS:-100}
      ARCHIVE_SECURITY_MAX_WRITES_PER_MINUTE: ${ARCHIVE_SECURITY_MAX_WRITES_PER_MINUTE:-60}
      ARCHIVE_SECURITY_ALLOWED_ORIGINS: ${ARCHIVE_SECURITY_ALLOWED_ORIGINS:-http://127.0.0.1:15173,http://localhost:15173}
      ARCHIVE_TOKEN_MARKET_TO_NEXUS: ${ARCHIVE_TOKEN_MARKET_TO_NEXUS:?ARCHIVE_TOKEN_MARKET_TO_NEXUS is required}
      ARCHIVE_TOKEN_NEXUS_TO_LOGISTICS: ${ARCHIVE_TOKEN_NEXUS_TO_LOGISTICS:?ARCHIVE_TOKEN_NEXUS_TO_LOGISTICS is required}
      ARCHIVE_TOKEN_NEXUS_TO_LEDGER: ${ARCHIVE_TOKEN_NEXUS_TO_LEDGER:?ARCHIVE_TOKEN_NEXUS_TO_LEDGER is required}
      ARCHIVE_TOKEN_NEXUS_TO_OS: ${ARCHIVE_TOKEN_NEXUS_TO_OS:?ARCHIVE_TOKEN_NEXUS_TO_OS is required}
      ARCHIVE_TOKEN_AUTHENTICATED_READ: ${ARCHIVE_TOKEN_AUTHENTICATED_READ:?ARCHIVE_TOKEN_AUTHENTICATED_READ is required}
      ARCHIVE_TOKEN_ADMIN_OPERATOR: ${ARCHIVE_TOKEN_ADMIN_OPERATOR:?ARCHIVE_TOKEN_ADMIN_OPERATOR is required}
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 150s
    depends_on:
      postgres:
        condition: service_healthy

  archive-nexus-frontend:
    build:
      context: ./frontend
    container_name: archive-nexus-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:15173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --output-document=- http://127.0.0.1/ > /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      archive-nexus-backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: archive-nexus-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      archive-nexus-backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: archive-nexus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
