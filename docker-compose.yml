services:
  postgres:
    image: postgres:16
    container_name: archive-nexus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archive_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-archive_nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archive_nexus_local}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  archive-nexus-backend:
    build:
      context: ./backend
    container_name: archive-nexus-backend
    environment:
      ARCHIVEOS_BASE_URL: ${ARCHIVEOS_BASE_URL:-http://host.docker.internal:8090}
      ARCHIVE_NEXUS_DB_URL: ${ARCHIVE_NEXUS_DB_URL:-jdbc:postgresql://postgres:5432/archive_nexus}
      ARCHIVE_NEXUS_DB_USERNAME: ${POSTGRES_USER:-archive_nexus}
      ARCHIVE_NEXUS_DB_PASSWORD: ${POSTGRES_PASSWORD:-archive_nexus_local}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  archive-nexus-frontend:
    build:
      context: ./frontend
    container_name: archive-nexus-frontend
    ports:
      - "15173:80"
    depends_on:
      archive-nexus-backend:
        condition: service_healthy

volumes:
  postgres-data:
