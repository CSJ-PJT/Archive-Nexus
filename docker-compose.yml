services:
  postgres:
    image: postgres:16
    container_name: archive-nexus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archive_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-archive_nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archive_nexus_local}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  archive-nexus-backend:
    build:
      context: ./backend
    container_name: archive-nexus-backend
    init: true
    restart: unless-stopped
    environment:
      ARCHIVEOS_BASE_URL: ${ARCHIVEOS_BASE_URL:-http://host.docker.internal:4000}
      ARCHIVEOS_INTEGRATION_TOKEN: ${ARCHIVEOS_INTEGRATION_TOKEN:-}
      ARCHIVEOS_TIMEOUT_MS: ${ARCHIVEOS_TIMEOUT_MS:-2000}
      ARCHIVE_NEXUS_DB_URL: ${ARCHIVE_NEXUS_DB_URL:-jdbc:postgresql://postgres:5432/archive_nexus}
      ARCHIVE_NEXUS_DB_USERNAME: ${POSTGRES_USER:-archive_nexus}
      ARCHIVE_NEXUS_DB_PASSWORD: ${POSTGRES_PASSWORD:-archive_nexus_local}
      ARCHIVE_NEXUS_DISCORD_WEBHOOK_URL: ${ARCHIVE_NEXUS_DISCORD_WEBHOOK_URL:-}
      ARCHIVE_LEDGER_ENABLED: ${ARCHIVE_LEDGER_ENABLED:-false}
      ARCHIVE_LEDGER_BASE_URL: ${ARCHIVE_LEDGER_BASE_URL:-http://host.docker.internal:18080}
      ARCHIVE_LEDGER_TIMEOUT_MS: ${ARCHIVE_LEDGER_TIMEOUT_MS:-2000}
      ARCHIVE_LEDGER_PUBLISH_INTERVAL_MS: ${ARCHIVE_LEDGER_PUBLISH_INTERVAL_MS:-15000}
      ARCHIVE_INTEGRATIONS_LOGITICS_ENABLED: ${ARCHIVE_INTEGRATIONS_LOGITICS_ENABLED:-false}
      ARCHIVE_INTEGRATIONS_LOGITICS_BASE_URL: ${ARCHIVE_INTEGRATIONS_LOGITICS_BASE_URL:-http://host.docker.internal:8092}
      ARCHIVE_INTEGRATIONS_LOGITICS_TIMEOUT_MS: ${ARCHIVE_INTEGRATIONS_LOGITICS_TIMEOUT_MS:-3000}
      ARCHIVE_INTEGRATIONS_LEDGER_ENABLED: ${ARCHIVE_INTEGRATIONS_LEDGER_ENABLED:-false}
      ARCHIVE_INTEGRATIONS_LEDGER_BASE_URL: ${ARCHIVE_INTEGRATIONS_LEDGER_BASE_URL:-http://host.docker.internal:18080}
      ARCHIVE_INTEGRATIONS_LEDGER_TIMEOUT_MS: ${ARCHIVE_INTEGRATIONS_LEDGER_TIMEOUT_MS:-3000}
      ARCHIVE_INTEGRATIONS_ROUTING_ALLOW_LEDGER_DIRECT_FALLBACK_FOR_LOGISTICS: ${ARCHIVE_INTEGRATIONS_ROUTING_ALLOW_LEDGER_DIRECT_FALLBACK_FOR_LOGISTICS:-false}
      ARCHIVE_INTEGRATIONS_ROUTING_CHUNK_SIZE: ${ARCHIVE_INTEGRATIONS_ROUTING_CHUNK_SIZE:-50}
      ARCHIVE_INTEGRATIONS_ROUTING_MAX_RETRY_COUNT: ${ARCHIVE_INTEGRATIONS_ROUTING_MAX_RETRY_COUNT:-5}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  archive-nexus-frontend:
    build:
      context: ./frontend
    container_name: archive-nexus-frontend
    restart: unless-stopped
    ports:
      - "15173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --output-document=- http://127.0.0.1/ > /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      archive-nexus-backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: archive-nexus-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      archive-nexus-backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: archive-nexus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-archive_nexus_local}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "13000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
